<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Trang chủ Gelato</title>
		<link rel="stylesheet" href="../assets/css/reset.css" />
		<link rel="stylesheet" href="../assets/css/index.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
			integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer" />
	</head>
	<body>
		<!-- Header -->
		<header>
			<div class="header-content">
				<!-- Logo -->
				<a href="../pages/index.html"
					><img
						src="../assets/photos/gelato_logo_black.svg"
						alt=""
						class="logo"
				/></a>

				<!-- Nav bar -->
				<nav class="nav-bar">
					<ul class="nav-list">
						<li class="nav-item">
							<a href="../pages/gioithieu.html">Giới thiệu</a>
						</li>
						<li class="nav-item">
							<a href="../pages/sanpham.html">Sản phẩm</a>
						</li>
						<li class="nav-item">
							<a href="../pages/lienhe.html">Liên hệ</a>
						</li>
					</ul>
				</nav>

				<!-- CTA Buttons -->
				<div class="cta-group">
					<a
						href="../pages/giohang.html"
						class="shopping-cart-button button"
						><i class="fa-solid fa-cart-shopping"></i
					></a>
					<a href="../pages/dangnhap.html" class="login-button button"
						>Đăng nhập</a
					>
					<a href="../pages/dangky.html" class="signup-button button"
						>Đăng ký</a
					>
				</div>
			</div>
		</header>

		<!-- Main -->
		<main>
			<div class="greeting-block">
				<div class="greeting-block-content">
					<div class="greeting-text">
						<h1 class="greeting-heading">
							Đời đẹp tựa như tranh của Gelato.
						</h1>
						<p class="greeting-content">
							Đắm chìm trong không gian trưng bay tranh vẽ. Mua
							sắm những tác phẩm theo sở thích của bản thân.
						</p>
						<a href="#!" class="button">Xem tác phẩm</a>
					</div>
					<img
						src="../assets/photos/33a6010579d62cca90014e0da054141b.jpg"
						alt=""
						class="greeting-image" />
				</div>
			</div>

			<div class="product-block">
				<div class="product-block-content">
					<h2 class="product-heading">
						Tác phẩm HOT <i class="fa-solid fa-fire"></i>
					</h2>
				</div>
			</div>
		</main>

		<!-- Footer -->
		<footer>
			<div class="footer-content">
				<div class="social-media-button-group">
					<a href="#!" class="button"
						><i class="fa-brands fa-facebook-f"></i
					></a>
					<a href="#!" class="button"
						><i class="fa-brands fa-instagram"></i
					></a>
					<a href="#!" class="button"
						><i class="fa-brands fa-snapchat"></i
					></a>
					<a href="#!" class="button"
						><i class="fa-brands fa-x-twitter"></i
					></a>
				</div>
				<p class="address">
					Đường 3/2, phường Xuân Khánh, quận Ninh Kiều, thành phố Cần
					Thơ
				</p>
				<p class="copyright">Gelato &copy; 2024</p>
			</div>
		</footer>
	</body>
</html>
